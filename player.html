<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Song Request Player</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; color: #fff;
                font-family: Segoe UI, sans-serif; overflow: hidden; }
  #player { width: 100vw; height: 100vh; }
  #info { position: fixed; left: 12px; bottom: 12px; max-width: 80vw;
          background: rgba(0,0,0,.55); padding: 8px 14px; border-radius: 10px;
          font-size: 20px; line-height: 1.3; }
  #info .req { opacity: .7; font-size: 15px; }
  #status { position: fixed; right: 10px; top: 8px; background: rgba(0,0,0,.5);
            padding: 3px 8px; border-radius: 6px; font-size: 12px; opacity: .55; }
  #overlay { position: fixed; inset: 0; display: none; align-items: center;
             justify-content: center; background: #000; font-size: 24px; opacity: .85; }
</style>
</head>
<body>
<div id="player"></div>
<div id="info">Warte auf Songs &hellip;</div>
<div id="status"></div>
<div id="overlay">Zum Starten klicken</div>

<script>
const TOKEN = new URLSearchParams(location.search).get("token") || "";
const POLL_MS = 5000;        // wie oft die Playlist auf Aenderungen geprueft wird
const LOOP = true;           // Playlist endlos wiederholen (keine Totzeit)
let player, ready = false;
let lastSig = "";            // Signatur der zuletzt geladenen Video-ID-Liste
let titles = {};             // video_id -> Titel (aus der YouTube-Playlist)

function api(path) {
  const sep = path.includes("?") ? "&" : "?";
  return path + sep + "token=" + encodeURIComponent(TOKEN);
}
function setStatus(t) { document.getElementById("status").textContent = t; }

function currentVideoId() {
  try { const d = player.getVideoData(); return d && d.video_id; }
  catch (e) { return null; }
}

function updateInfo() {
  const vid = currentVideoId();
  let title = (vid && titles[vid]) || "";
  if (!title) { try { const d = player.getVideoData(); title = (d && d.title) || ""; } catch (e) {} }
  let pos = "";
  try {
    const list = player.getPlaylist() || [];
    const i = player.getPlaylistIndex();
    if (list.length && i >= 0) pos = (i + 1) + " / " + list.length;
  } catch (e) {}
  document.getElementById("info").innerHTML = title
    ? title + (pos ? ' <span class="req">' + pos + "</span>" : "")
    : "Warte auf Songs &hellip;";
}

function updateMediaMetadata() {
  if (!("mediaSession" in navigator) || !window.MediaMetadata) return;
  const vid = currentVideoId();
  let title = (vid && titles[vid]) || "";
  if (!title) { try { const d = player.getVideoData(); title = (d && d.title) || ""; } catch (e) {} }
  try {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: title || "Song Request Player",
      album: "Songrequests",
    });
  } catch (e) {}
}

// ---- Steuerung ----
function togglePlay() {
  if (!player || !player.getPlayerState) return;
  player.getPlayerState() === YT.PlayerState.PLAYING
    ? player.pauseVideo() : player.playVideo();
}
function restartSong() { try { player.seekTo(0, true); player.playVideo(); } catch (e) {} }
function nextSong() { try { player.nextVideo(); } catch (e) {} }
function prevSong() { try { player.previousVideo(); } catch (e) {} }

document.addEventListener("keydown", (e) => {
  switch (e.code) {
    case "Space": case "KeyK": e.preventDefault(); togglePlay(); break;
    case "ArrowRight": case "KeyN": nextSong(); break;
    case "ArrowLeft": prevSong(); break;
  }
});

function setupMediaSession() {
  if (!("mediaSession" in navigator)) return;
  try {
    navigator.mediaSession.setActionHandler("play", () => player.playVideo());
    navigator.mediaSession.setActionHandler("pause", () => player.pauseVideo());
    navigator.mediaSession.setActionHandler("stop", () => player.pauseVideo());
    navigator.mediaSession.setActionHandler("nexttrack", () => nextSong());
    navigator.mediaSession.setActionHandler("previoustrack", () => prevSong());
  } catch (e) {}
}

// ---- YouTube IFrame API ----
function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    width: "100%", height: "100%",
    playerVars: { autoplay: 1, controls: 1, modestbranding: 1, rel: 0, playsinline: 1 },
    events: {
      onReady: () => {
        ready = true;
        try { player.setLoop(LOOP); } catch (e) {}
        setupMediaSession();
        refresh();
        setInterval(refresh, POLL_MS);
        setInterval(() => { updateInfo(); updateMediaMetadata(); }, 1000);
      },
      onStateChange: onState,
      onError: () => nextSong(),   // nicht abspielbar (privat/gesperrt) -> ueberspringen
    },
  });
}

function onState(e) {
  if (e.data === YT.PlayerState.ENDED) {
    // Playlist-Ende -> neu laden, damit neue Requests auftauchen.
    if (!LOOP) refresh();
  }
}

async function refresh() {
  if (!ready) return;
  try {
    const r = await fetch(api("/api/playlist"), { cache: "no-store" });
    if (!r.ok) { setStatus("API " + r.status); return; }
    const data = await r.json();

    if (data.playlist_id === null) {
      setStatus("Keine YT-Playlist konfiguriert");
      document.getElementById("info").textContent =
        "Keine YouTube-Playlist konfiguriert (YOUTUBE_PLAYLIST_ID).";
      return;
    }

    const items = (data.items || []).filter((it) => it.video_id);
    const ids = items.map((it) => it.video_id);
    titles = {};
    items.forEach((it) => { titles[it.video_id] = it.title; });

    const sig = ids.join(",");
    if (sig === lastSig) { setStatus("Songs: " + ids.length); updateInfo(); return; }
    lastSig = sig;

    if (ids.length === 0) {
      try { player.stopVideo(); } catch (e) {}
      setStatus("Playlist leer");
      updateInfo();
      return;
    }

    // (Neu) laden – dabei den aktuell laufenden Song moeglichst beibehalten.
    const curId = currentVideoId();
    const idx = ids.indexOf(curId);
    let start = 0, startSec = 0;
    if (idx >= 0) {
      start = idx;
      try { startSec = player.getCurrentTime() || 0; } catch (e) {}
    }
    player.loadPlaylist(ids, start, startSec);
    try { player.setLoop(LOOP); } catch (e) {}
    setStatus("Songs: " + ids.length);
    updateInfo();
  } catch (e) { setStatus("Verbindungsfehler"); }
}

// Falls der Browser Autoplay mit Ton blockiert (normaler Tab): ein Klick startet.
document.getElementById("overlay").addEventListener("click", () => {
  document.getElementById("overlay").style.display = "none";
  if (player && player.playVideo) player.playVideo();
});
</script>
<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
