<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Song Request Player</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #000; color: #fff;
               font-family: Segoe UI, sans-serif; overflow: hidden; }

  /* ---- Layout ---- */
  #wrap { display: flex; height: 100vh; }
  #player-col { flex: 1 1 auto; position: relative; min-width: 0; }
  #player { width: 100%; height: 100%; }

  /* ---- Playlist-Sidebar ---- */
  #sidebar {
    flex: 0 0 320px; width: 320px;
    background: #111; display: flex; flex-direction: column;
    border-left: 1px solid #222; transition: width .25s ease, flex-basis .25s ease;
  }
  #sidebar.collapsed { flex-basis: 0; width: 0; overflow: hidden; }

  #sidebar-header {
    padding: 12px 14px 10px; background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  #sidebar-header span { font-weight: 600; font-size: 14px; color: #ccc; }
  #sidebar-header small { color: #666; font-size: 11px; margin-left: 6px; }

  #playlist-list {
    flex: 1 1 auto; overflow-y: auto; padding: 6px 0;
  }
  #playlist-list::-webkit-scrollbar { width: 5px; }
  #playlist-list::-webkit-scrollbar-track { background: #111; }
  #playlist-list::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  .pl-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; cursor: pointer; border-radius: 6px; margin: 2px 6px;
    transition: background .15s;
  }
  .pl-item:hover { background: #222; }
  .pl-item.active { background: #1e1245; border-left: 3px solid #9146ff; padding-left: 9px; }
  .pl-num { font-size: 11px; color: #555; width: 20px; text-align: right; flex-shrink: 0; }
  .pl-item.active .pl-num { color: #9146ff; }
  .pl-thumb { width: 48px; height: 27px; border-radius: 3px; object-fit: cover;
              background: #1a1a1a; flex-shrink: 0; }
  .pl-meta { flex: 1; min-width: 0; }
  .pl-title { font-size: 12px; white-space: nowrap; overflow: hidden;
              text-overflow: ellipsis; color: #ddd; }
  .pl-item.active .pl-title { color: #fff; font-weight: 600; }
  .pl-req { font-size: 10px; color: #666; margin-top: 2px; }
  .pl-now { font-size: 10px; color: #9146ff; margin-top: 1px; }

  /* ---- Toggle-Button ---- */
  #toggle-btn {
    position: fixed; right: 0; top: 50%; transform: translateY(-50%);
    background: #1a1a1a; border: 1px solid #333; border-right: none;
    color: #aaa; padding: 10px 6px; cursor: pointer; border-radius: 6px 0 0 6px;
    font-size: 16px; z-index: 100; transition: background .15s;
    writing-mode: horizontal-tb;
  }
  #toggle-btn:hover { background: #222; color: #fff; }
  body.sidebar-open #toggle-btn { right: 320px; }

  /* ---- Info-Box (Now Playing) ---- */
  #info { position: fixed; left: 12px; bottom: 12px; max-width: 60vw;
          background: rgba(0,0,0,.6); padding: 8px 14px; border-radius: 10px;
          font-size: 18px; line-height: 1.3; pointer-events: none; }
  #info .req { opacity: .7; font-size: 14px; }

  #status { position: fixed; left: 12px; top: 8px; background: rgba(0,0,0,.5);
            padding: 3px 8px; border-radius: 6px; font-size: 11px; opacity: .55; }

  #overlay { position: fixed; inset: 0; display: none; align-items: center;
             justify-content: center; background: #000; font-size: 24px; opacity: .85;
             z-index: 200; }
</style>
</head>
<body>
<div id="wrap">
  <div id="player-col">
    <div id="player"></div>
  </div>
  <div id="sidebar" class="collapsed">
    <div id="sidebar-header">
      <div><span>Warteschlange</span><small id="pl-count"></small></div>
    </div>
    <div id="playlist-list"></div>
  </div>
</div>

<div id="info">Warte auf Songs &hellip;</div>
<div id="status"></div>
<button id="toggle-btn" title="Playlist ein-/ausblenden">☰</button>
<div id="overlay">Zum Starten klicken</div>

<script>
const TOKEN = new URLSearchParams(location.search).get("token") || "";
const POLL_MS = 3000;
let player, ready = false;
let items = [];
let currentVid = null;
let currentIdx = 0;
let lastSkipSeq = null;

function api(path) {
  const sep = path.includes("?") ? "&" : "?";
  return path + sep + "token=" + encodeURIComponent(TOKEN);
}
function setStatus(t) { document.getElementById("status").textContent = t; }

function indexOfCurrent() {
  return items.findIndex((it) => it.video_id === currentVid);
}

function setInfo() {
  const it = items[indexOfCurrent()];
  document.getElementById("info").innerHTML = it
    ? it.title + (it.requester ? ' <span class="req">— @' + it.requester + "</span>" : "")
    : "Warte auf Songs &hellip;";
}

function updateMediaMetadata() {
  if (!("mediaSession" in navigator) || !window.MediaMetadata) return;
  const it = items[indexOfCurrent()];
  try {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: it ? it.title : "Song Request Player",
      artist: it && it.requester ? "@" + it.requester : "",
      album: "Songrequests",
    });
  } catch (e) {}
}

// ---- Playlist-Sidebar rendern ----
function renderPlaylist() {
  const list = document.getElementById("playlist-list");
  const ci = indexOfCurrent();
  document.getElementById("pl-count").textContent =
    items.length ? " · " + items.length + " Songs" : "";

  // Nur neu rendern wenn nötig (Anzahl oder aktiver Index geändert)
  const prev = list.dataset.rendered;
  const sig = items.length + ":" + ci;
  if (prev === sig) return;
  list.dataset.rendered = sig;

  list.innerHTML = "";
  items.forEach((it, i) => {
    const div = document.createElement("div");
    div.className = "pl-item" + (i === ci ? " active" : "");
    div.innerHTML =
      `<span class="pl-num">${i + 1}</span>` +
      `<img class="pl-thumb" src="https://i.ytimg.com/vi/${it.video_id}/default.jpg" loading="lazy">` +
      `<div class="pl-meta">` +
        `<div class="pl-title" title="${escHtml(it.title)}">${escHtml(it.title)}</div>` +
        (it.requester ? `<div class="pl-req">@${escHtml(it.requester)}</div>` : "") +
        (i === ci ? `<div class="pl-now">▶ läuft gerade</div>` : "") +
      `</div>`;
    div.addEventListener("click", () => playAt(i));
    list.appendChild(div);
  });

  // Aktiven Song in der Liste sichtbar scrollen
  if (ci >= 0) {
    const active = list.querySelector(".active");
    if (active) active.scrollIntoView({ block: "nearest" });
  }
}

function escHtml(s) {
  return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ---- Sidebar Toggle ----
const sidebar = document.getElementById("sidebar");
const toggleBtn = document.getElementById("toggle-btn");
let sidebarOpen = false;

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  sidebar.classList.toggle("collapsed", !sidebarOpen);
  document.body.classList.toggle("sidebar-open", sidebarOpen);
  toggleBtn.textContent = sidebarOpen ? "✕" : "☰";
}
toggleBtn.addEventListener("click", toggleSidebar);

// ---- Wiedergabe ----
function playAt(i) {
  if (!items.length) {
    currentVid = null;
    try { player.stopVideo(); } catch (e) {}
    setInfo(); renderPlaylist();
    return;
  }
  i = ((i % items.length) + items.length) % items.length;
  currentIdx = i;
  currentVid = items[i].video_id;
  player.loadVideoById(items[i].video_id);
  setInfo();
  updateMediaMetadata();
  renderPlaylist();
}

function advance() {
  if (!items.length) return;
  const ci = indexOfCurrent();
  playAt(ci >= 0 ? ci + 1 : currentIdx);
}

function restartSong() { try { player.seekTo(0, true); player.playVideo(); } catch (e) {} }

// ---- Media Session ----
function setupMediaSession() {
  if (!("mediaSession" in navigator)) return;
  try {
    navigator.mediaSession.setActionHandler("play", () => player.playVideo());
    navigator.mediaSession.setActionHandler("pause", () => player.pauseVideo());
    navigator.mediaSession.setActionHandler("stop", () => player.pauseVideo());
    navigator.mediaSession.setActionHandler("nexttrack", () => advance());
    navigator.mediaSession.setActionHandler("previoustrack", () => restartSong());
  } catch (e) {}
}

// ---- YouTube IFrame API ----
function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    width: "100%", height: "100%",
    playerVars: { autoplay: 1, controls: 1, modestbranding: 1, rel: 0, playsinline: 1 },
    events: {
      onReady: () => {
        ready = true;
        setupMediaSession();
        refresh();
        setInterval(refresh, POLL_MS);
        setInterval(reportNow, 2000);
      },
      onStateChange: onState,
      onError: () => setTimeout(advance, 800),
    },
  });
}

function onState(e) {
  if (e.data === YT.PlayerState.ENDED) advance();
}

async function reportNow() {
  if (!ready || currentVid == null) return;
  let pos = 0, dur = 0, playing = false;
  try { pos = player.getCurrentTime() || 0; } catch (e) {}
  try { dur = player.getDuration() || 0; } catch (e) {}
  try { playing = player.getPlayerState() === YT.PlayerState.PLAYING; } catch (e) {}
  const it = items[indexOfCurrent()] || {};
  try {
    await fetch(api("/api/nowplaying"), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        video_id: currentVid,
        title: it.title || "",
        requester: it.requester || "",
        position: pos, duration: dur, playing,
      }),
    });
  } catch (e) {}
}

async function refresh() {
  if (!ready) return;
  try {
    const r = await fetch(api("/api/playlist"), { cache: "no-store" });
    if (!r.ok) { setStatus("API " + r.status); return; }
    const data = await r.json();

    if (data.playlist_id === null) {
      setStatus("Keine YT-Playlist konfiguriert");
      document.getElementById("info").textContent =
        "Keine YouTube-Playlist konfiguriert (YOUTUBE_PLAYLIST_ID).";
      return;
    }

    items = (data.items || []).filter((it) => it.video_id);
    setStatus(items.length ? "Songs: " + items.length : "Playlist leer");
    renderPlaylist();

    // Skip-Signal
    if (lastSkipSeq === null) {
      lastSkipSeq = data.skip_seq;
    } else if (data.skip_seq !== lastSkipSeq) {
      lastSkipSeq = data.skip_seq;
      advance();
      return;
    }

    if (!items.length) { currentVid = null; setInfo(); return; }

    if (currentVid === null) {
      playAt(0);
    } else if (indexOfCurrent() === -1) {
      playAt(currentIdx);
    } else {
      setInfo();
    }
  } catch (e) { setStatus("Verbindungsfehler"); }
}

document.getElementById("overlay").addEventListener("click", () => {
  document.getElementById("overlay").style.display = "none";
  if (player && player.playVideo) player.playVideo();
});
</script>
<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
