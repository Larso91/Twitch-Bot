<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Song Request Player</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; color: #fff;
                font-family: Segoe UI, sans-serif; overflow: hidden; }
  #player { width: 100vw; height: 100vh; }
  #info { position: fixed; left: 12px; bottom: 12px; max-width: 80vw;
          background: rgba(0,0,0,.55); padding: 8px 14px; border-radius: 10px;
          font-size: 20px; line-height: 1.3; }
  #info .req { opacity: .7; font-size: 15px; }
  #status { position: fixed; right: 10px; top: 8px; background: rgba(0,0,0,.5);
            padding: 3px 8px; border-radius: 6px; font-size: 12px; opacity: .55; }
  #overlay { position: fixed; inset: 0; display: none; align-items: center;
             justify-content: center; background: #000; font-size: 24px; opacity: .85; }
</style>
</head>
<body>
<div id="player"></div>
<div id="info">Warte auf Songs &hellip;</div>
<div id="status"></div>
<div id="overlay">Zum Starten klicken</div>

<script>
const TOKEN = new URLSearchParams(location.search).get("token") || "";
const POLL_MS = 3000;        // Playlist auf Aenderungen pruefen (snappy Skip)
let player, ready = false;
let items = [];              // [{item_id, video_id, title, requester}] in Reihenfolge
let currentItemId = null;
const recentlyRemoved = new Set();   // verhindert Wiederauftauchen wegen API-Latenz

function api(path) {
  const sep = path.includes("?") ? "&" : "?";
  return path + sep + "token=" + encodeURIComponent(TOKEN);
}
function setStatus(t) { document.getElementById("status").textContent = t; }

function setInfo() {
  const it = items[0];
  document.getElementById("info").innerHTML = it
    ? it.title + (it.requester ? ' <span class="req">— @' + it.requester + "</span>" : "")
    : "Warte auf Songs &hellip;";
}

function updateMediaMetadata() {
  if (!("mediaSession" in navigator) || !window.MediaMetadata) return;
  const it = items[0];
  try {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: it ? it.title : "Song Request Player",
      artist: it && it.requester ? "@" + it.requester : "",
      album: "Songrequests",
    });
  } catch (e) {}
}

// ---- Steuerung: NUR Medientasten ----
// Play/Pause uebernimmt YouTube global selbst (eigene Media-Session des iframes).
// Next-Track wird zusaetzlich global per AutoHotkey -> /api/skip abgefangen.
function setupMediaSession() {
  if (!("mediaSession" in navigator)) return;
  try {
    navigator.mediaSession.setActionHandler("play", () => player.playVideo());
    navigator.mediaSession.setActionHandler("pause", () => player.pauseVideo());
    navigator.mediaSession.setActionHandler("stop", () => player.pauseVideo());
    navigator.mediaSession.setActionHandler("nexttrack", () => finishCurrent());
    navigator.mediaSession.setActionHandler("previoustrack", () => restartSong());
  } catch (e) {}
}
function restartSong() { try { player.seekTo(0, true); player.playVideo(); } catch (e) {} }

// ---- YouTube IFrame API ----
function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    width: "100%", height: "100%",
    playerVars: { autoplay: 1, controls: 1, modestbranding: 1, rel: 0, playsinline: 1 },
    events: {
      onReady: () => {
        ready = true;
        setupMediaSession();
        refresh();
        setInterval(refresh, POLL_MS);
        setInterval(reportNow, 2000);   // Position/Dauer ans Overlay melden
      },
      onStateChange: onState,
      onError: () => finishCurrent(),   // nicht abspielbar -> entfernen & weiter
    },
  });
}

function onState(e) {
  if (e.data === YT.PlayerState.ENDED) finishCurrent();
}

function loadCurrent() {
  if (!items.length) {
    if (currentItemId !== null) { try { player.stopVideo(); } catch (e) {} }
    currentItemId = null;
    setInfo();
    return;
  }
  const it = items[0];
  if (it.item_id === currentItemId) return;   // laeuft bereits -> nicht unterbrechen
  currentItemId = it.item_id;
  player.loadVideoById(it.video_id);
  setInfo();
  updateMediaMetadata();
}

// Aktuellen Song als fertig markieren: aus der YouTube-Playlist entfernen & weiter.
async function finishCurrent() {
  if (!currentItemId) return;
  const removeId = currentItemId;
  recentlyRemoved.add(removeId);
  setTimeout(() => recentlyRemoved.delete(removeId), 30000);
  items = items.filter((it) => it.item_id !== removeId);
  currentItemId = null;
  try {
    await fetch(api("/api/playlist/remove?item_id=" + encodeURIComponent(removeId)),
      { method: "POST" });
  } catch (e) {}
  loadCurrent();
}

// Aktuelle Wiedergabe-Position an den Bot melden (fuer das OBS-Overlay).
async function reportNow() {
  if (!ready || !currentItemId) return;
  const it = items[0];
  if (!it) return;
  let pos = 0, dur = 0, playing = false;
  try { pos = player.getCurrentTime() || 0; } catch (e) {}
  try { dur = player.getDuration() || 0; } catch (e) {}
  try { playing = player.getPlayerState() === YT.PlayerState.PLAYING; } catch (e) {}
  try {
    await fetch(api("/api/nowplaying"), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ video_id: it.video_id, position: pos, duration: dur, playing }),
    });
  } catch (e) {}
}

async function refresh() {
  if (!ready) return;
  try {
    const r = await fetch(api("/api/playlist"), { cache: "no-store" });
    if (!r.ok) { setStatus("API " + r.status); return; }
    const data = await r.json();

    if (data.playlist_id === null) {
      setStatus("Keine YT-Playlist konfiguriert");
      document.getElementById("info").textContent =
        "Keine YouTube-Playlist konfiguriert (YOUTUBE_PLAYLIST_ID).";
      return;
    }

    items = (data.items || [])
      .filter((it) => it.video_id && !recentlyRemoved.has(it.item_id));
    setStatus(items.length ? "In Queue: " + items.length : "Playlist leer");
    loadCurrent();
    setInfo();
    updateMediaMetadata();
  } catch (e) { setStatus("Verbindungsfehler"); }
}

// Falls der Browser Autoplay mit Ton blockiert (normaler Tab): ein Klick startet.
document.getElementById("overlay").addEventListener("click", () => {
  document.getElementById("overlay").style.display = "none";
  if (player && player.playVideo) player.playVideo();
});
</script>
<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
