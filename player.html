<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Song Request Player</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; color: #fff;
                font-family: Segoe UI, sans-serif; overflow: hidden; }
  #player { width: 100vw; height: 100vh; }
  #info { position: fixed; left: 12px; bottom: 12px; max-width: 80vw;
          background: rgba(0,0,0,.55); padding: 8px 14px; border-radius: 10px;
          font-size: 20px; line-height: 1.3; }
  #info .req { opacity: .7; font-size: 15px; }
  #status { position: fixed; right: 10px; top: 8px; background: rgba(0,0,0,.5);
            padding: 3px 8px; border-radius: 6px; font-size: 12px; opacity: .55; }
  #overlay { position: fixed; inset: 0; display: none; align-items: center;
             justify-content: center; background: #000; font-size: 24px; opacity: .85; }
</style>
</head>
<body>
<div id="player"></div>
<div id="info">Warte auf Songs &hellip;</div>
<div id="status"></div>
<div id="overlay">Zum Starten klicken</div>

<script>
const TOKEN = new URLSearchParams(location.search).get("token") || "";
const POLL_MS = 3000;
let player, currentId = null, ready = false;

function api(path) {
  const sep = path.includes("?") ? "&" : "?";
  return path + sep + "token=" + encodeURIComponent(TOKEN);
}
function setStatus(t) { document.getElementById("status").textContent = t; }
function setInfo(title, req) {
  document.getElementById("info").innerHTML = title
    ? title + ' <span class="req">— @' + req + "</span>"
    : "Warte auf Songs &hellip;";
}

// ---- Steuerung ----
function togglePlay() {
  if (!player || !player.getPlayerState) return;
  player.getPlayerState() === YT.PlayerState.PLAYING
    ? player.pauseVideo() : player.playVideo();
}
function restartSong() {
  try { player.seekTo(0, true); player.playVideo(); } catch (e) {}
}
function skipSong() { finishCurrent(); }

// Tastatur-Shortcuts (greifen, wenn dieses Fenster im Vordergrund ist)
document.addEventListener("keydown", (e) => {
  switch (e.code) {
    case "Space": case "KeyK": e.preventDefault(); togglePlay(); break;
    case "ArrowRight": case "KeyN": skipSong(); break;
    case "ArrowLeft": restartSong(); break;
  }
});

// Echte Medientasten (Play/Pause global ueber den YouTube-Player)
function setupMediaSession() {
  if (!("mediaSession" in navigator)) return;
  try {
    navigator.mediaSession.setActionHandler("play", () => player.playVideo());
    navigator.mediaSession.setActionHandler("pause", () => player.pauseVideo());
    navigator.mediaSession.setActionHandler("stop", () => player.pauseVideo());
    navigator.mediaSession.setActionHandler("nexttrack", () => skipSong());
    navigator.mediaSession.setActionHandler("previoustrack", () => restartSong());
  } catch (e) {}
}
function updateMediaMetadata(title, req) {
  if (!("mediaSession" in navigator) || !window.MediaMetadata) return;
  try {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: title || "Song Request Player",
      artist: req ? "@" + req : "",
      album: "Songrequests",
    });
  } catch (e) {}
}

// ---- YouTube IFrame API ----
function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    width: "100%", height: "100%",
    playerVars: { autoplay: 1, controls: 1, modestbranding: 1, rel: 0, playsinline: 1 },
    events: {
      onReady: () => { ready = true; setupMediaSession(); poll(); setInterval(poll, POLL_MS); },
      onStateChange: onState,
      onError: () => finishCurrent(),  // nicht abspielbar -> ueberspringen
    },
  });
}

async function poll() {
  if (!ready) return;
  try {
    const r = await fetch(api("/api/queue"), { cache: "no-store" });
    if (!r.ok) { setStatus("API " + r.status); return; }
    const data = await r.json();
    const cur = data.current;
    if (!cur) {
      if (currentId !== null) { try { player.stopVideo(); } catch (e) {} }
      currentId = null;
      setInfo(null);
      setStatus("Queue leer");
      return;
    }
    setStatus("In Queue: " + data.queue.length);
    if (cur.id !== currentId) {
      currentId = cur.id;
      setInfo(cur.title, cur.requester);
      updateMediaMetadata(cur.title, cur.requester);
      if (cur.video_id) player.loadVideoById(cur.video_id);
    }
  } catch (e) { setStatus("Verbindungsfehler"); }
}

function onState(e) {
  if (e.data === YT.PlayerState.ENDED) finishCurrent();
}

async function finishCurrent() {
  if (currentId == null) return;
  const id = currentId;
  currentId = null;          // verhindert Doppel-Ausloesung
  try { await fetch(api("/api/finished?id=" + id), { method: "POST" }); } catch (e) {}
  poll();                    // sofort naechsten Song holen
}

// Falls der Browser Autoplay mit Ton blockiert (normaler Tab): ein Klick startet.
document.getElementById("overlay").addEventListener("click", () => {
  document.getElementById("overlay").style.display = "none";
  if (player && player.playVideo) player.playVideo();
});
</script>
<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
